    with open("news/latest.zh.md", "r", encoding="utf-8") as f:
        news_zh = f.read()
    with open("news/latest.en.md", "r", encoding="utf-8") as f:
        news_en = f.read()
except:
    news_zh = "# 暂无新闻\n\n新闻将在每天早上 9:05 自动生成"
    news_en = "# No news yet\n\nNews will be generated daily at 9:05 AM (Beijing Time)"

# Simple Markdown to HTML converter
def md_to_html(md):
    html = md
    html = html.replace("# ", "<h1>")
    html = html.replace("## ", "<h2>")
    html = html.replace("### ", "<h3>")
    html = html.replace("\n", "</h1>\n").replace("<h1>", "<h1>")  # Fix h1
    html = html.replace("**", "<strong>").replace("**", "</strong>", 1)
    html = html.replace("[", "<a href='").replace("]", "'>").replace(")", "</a>")
    return html

